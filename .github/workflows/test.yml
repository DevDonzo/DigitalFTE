name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install dependencies
        run: |
          python -m pip install -r requirements-dev.txt
          npm install --omit=dev --ignore-scripts

      - name: Check Python syntax
        run: python -m compileall -q agents auth control_center scripts utils watchers

      - name: Check JavaScript and shell syntax
        run: |
          find mcp_servers -name '*.js' -print0 | xargs -0 -n1 node --check
          node --check public/assets/app.js
          node --check control_center/static/app.js
          bash -n start_all.sh start_ai_services.sh stop_all.sh scripts/*.sh
          npm run smoke:mcp

      - name: Run tests
        run: pytest -q
